<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Recipe</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">
        <h2 class="mb-4">Add New Recipe</h2>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- Recipe Name -->
            <div class="mb-3">
                <label class="form-label">Recipe Name</label>
                <input type="text" name="recipe_name" class="form-control" placeholder="Enter recipe name" required>
            </div>

            <!-- Description -->
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="desc" class="form-control" rows="4" placeholder="Write description..." required></textarea>
            </div>

            <!-- Image -->
            <div class="mb-3">
                <label class="form-label">Recipe Image</label>
                <input type="file" name="image" class="form-control" accept="image/*" required>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-primary w-100">
                Save Recipe
            </button>
        </form>

    </div>

</div>

</body>
</html>
